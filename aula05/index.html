<head>

    <title>meu primeiro programa</title>

        body {
            background-color: rgb(107,107,207);

            font: normal 20pt arial;

            color: darkorange;

    </style>

<body>
    <h1>olá mundo</h1>

       let n1 = Number.parseFloat(prompt("Digite um número: "));
       let n2 = Number(prompt("Digite um número: "));

    </script>
