<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font: normal 20pt arial;
        }
    </style>
</head>
<body>
    <script>
        let nome = prompt("qual é o seu nome");
        document.writeln(`Seu nome tem ${nome.length} letras<br>`);
        document.writeln(`Seu nome em maiúsculas é ${nome.toUpperCase()}<br>`);
        document.writeln(`Seu nome em minúsculas é ${nome.toLowerCase()}<br>`);
        let n1 = 1545.5;
        n1.toFixed(2).replace('.',',');
        alert(n1.toLocaleString('pt-BR',{style: 'currency', currency: 'BRL'}));
        
    </script>
</body>
</html>
